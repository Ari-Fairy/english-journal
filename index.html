<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#D4A5A5;--sage:#94A187;--lavender:#B8B5D0;--cream:#FDFBF7;--warm:#4A443F;--muted:#888;
  --card:rgba(255,255,255,.72);--border:rgba(245,230,211,.6);
  --rose-soft:rgba(212,165,165,.12);--sage-soft:rgba(148,161,135,.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--warm);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(212,165,165,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(148,161,135,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
.app{max-width:600px;margin:0 auto;padding:16px 16px 88px;position:relative;z-index:1}
.card{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.85);border-radius:1.75rem;padding:1.4rem;box-shadow:0 6px 24px rgba(74,68,63,.05),0 1px 3px rgba(74,68,63,.03)}
.btn{transition:all .18s;cursor:pointer;border:none;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--rose);color:#fff;border-radius:999px;padding:12px 24px;font-weight:600;box-shadow:0 4px 14px rgba(212,165,165,.28)}
.btn-secondary{background:var(--sage);color:#fff;border-radius:999px;padding:12px 24px;font-weight:600;box-shadow:0 4px 14px rgba(148,161,135,.28)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--warm);border-radius:999px;padding:10px 20px;font-weight:500}
.btn-ghost{background:transparent;color:var(--sage);padding:4px 8px;font-size:14px}
.btn-sm{padding:6px 12px;font-size:13px}
.input{width:100%;padding:11px 15px;border:1.5px solid var(--border);background:rgba(253,251,247,.6);border-radius:1rem;font-size:15px;color:var(--warm);outline:none;font-family:inherit;transition:border-color .15s}
.input:focus{border-color:rgba(212,165,165,.5);box-shadow:0 0 0 3px rgba(212,165,165,.1)}
.textarea{width:100%;padding:14px 15px;border:1.5px solid var(--border);background:rgba(253,251,247,.6);border-radius:1rem;font-size:14px;color:var(--warm);outline:none;font-family:'DM Sans',monospace;resize:vertical;transition:border-color .15s}
.select{padding:10px 13px;border:1.5px solid var(--border);background:#fff;border-radius:1rem;font-size:13px;color:var(--warm);outline:none;font-family:inherit;cursor:pointer}
.tabs{display:flex;gap:4px;padding:4px;background:rgba(245,230,211,.25);border-radius:999px}
.tab{flex:1;padding:9px;border-radius:999px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;border:none;background:transparent;color:#aaa;transition:all .2s;font-family:inherit}
.tab.active{background:#fff;color:var(--rose);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-box{text-align:center;padding:16px}
.stat-num{font-size:28px;font-family:'Lora',serif;font-weight:700}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#aaa;margin-top:4px}
.divider{width:1px;height:32px;background:var(--border)}
.fade-in{animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.progress-bar{height:4px;background:rgba(245,230,211,.35);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--rose);border-radius:999px;transition:width .5s}
.badge{display:inline-block;padding:4px 12px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:rgba(245,230,211,.4);color:var(--warm)}
.badge-green{background:rgba(148,161,135,.15);color:var(--sage)}
.badge-rose{background:rgba(212,165,165,.15);color:var(--rose)}
.word-row{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(253,251,247,.5);border-radius:12px;margin-bottom:6px}
.word-row input{flex:1;border:none;background:transparent;padding:4px 8px;font-size:14px;color:var(--warm);outline:none}
.word-row input:focus{background:rgba(245,230,211,.3);border-radius:8px}
.overlay{position:fixed;inset:0;background:rgba(74,68,63,.18);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay-card{max-width:420px;width:100%}
.chart-bar{display:flex;align-items:flex-end;gap:2px;height:100px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center}
.chart-label{font-size:9px;color:#bbb;margin-top:4px}
.section-title{font-family:'Lora',serif;font-style:italic;font-size:20px;color:var(--warm);margin-bottom:8px}
.sub-text{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.12em}
.menu-card{background:var(--card);border:1px solid rgba(255,255,255,.85);border-radius:1.5rem;padding:18px 14px;box-shadow:0 4px 16px rgba(0,0,0,.04);text-align:center;cursor:pointer;transition:all .22s}
.menu-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,.07)}
.menu-card .icon{font-size:22px;margin-bottom:6px}
.menu-card .title{font-family:'Lora',serif;font-style:italic;font-size:15px;color:var(--warm)}
.menu-card .sub{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.study-card{min-height:240px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:16px 0}
.study-word{font-family:'Lora',serif;font-style:italic;font-size:34px;color:var(--warm);line-height:1.3}
.choice-btn{width:100%;padding:15px 18px;border:1.5px solid var(--border);background:rgba(255,255,255,.7);border-radius:1.5rem;text-align:left;font-size:15px;color:var(--warm);cursor:pointer;transition:all .18s;font-family:inherit}
.choice-btn:hover{background:rgba(245,230,211,.3);border-color:var(--rose)}
.voice-btn{width:88px;height:88px;border-radius:50%;font-size:30px;margin:0 auto;display:flex;align-items:center;justify-content:center}
.voice-btn.listening{background:var(--rose);color:#fff;animation:pulse 1.5s infinite}
.voice-btn.idle{background:#fff;color:var(--rose);border:3px solid rgba(212,165,165,.2)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.back-btn{color:var(--sage);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;border:none;background:none;font-family:inherit}
.irregular-table{width:100%;font-size:13px;border-collapse:collapse}
.irregular-table th{padding:8px;text-align:left;font-weight:600;color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.irregular-table td{padding:8px;border-top:1px solid #f0ebe3}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--warm);color:#fff;padding:11px 22px;border-radius:999px;font-size:14px;z-index:300;animation:fi .3s;pointer-events:none;white-space:nowrap}
.hidden-input{display:none}
.speak-btn{cursor:pointer;border:none;background:none;font-size:15px;padding:2px;opacity:.6;transition:opacity .15s}
.speak-btn:hover{opacity:1}
.hint-box{margin-top:10px;background:rgba(212,165,165,.1);border:1px solid rgba(212,165,165,.22);border-radius:10px;padding:8px 16px;font-size:14px;color:var(--rose);font-weight:600;display:inline-block}
.recog-error{background:rgba(212,165,165,.07);border:1px solid rgba(212,165,165,.25);border-radius:14px;padding:12px;margin-top:12px;text-align:center}
.recog-error .msg{font-size:14px;color:var(--rose);margin-bottom:4px}
.recog-error .sub{font-size:12px;color:#aaa}

.word-add-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(74,68,63,.25);display:flex;align-items:center;justify-content:center;z-index:250;padding:20px;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.word-add-card{background:rgba(212,165,165,.12);border:1.5px solid rgba(212,165,165,.3);border-radius:1.75rem;padding:24px;max-width:420px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.12)}
.word-add-card h3{font-family:'Lora',serif;font-style:italic;font-size:18px;color:var(--warm);margin-bottom:16px;font-weight:600}
.word-add-card .word-disp{font-family:'Lora',serif;font-style:italic;font-size:28px;color:var(--rose);font-weight:600;margin-bottom:16px;padding:12px;background:rgba(253,251,247,.8);border-radius:1rem;text-align:center}
.word-add-card .field-group{margin-bottom:14px}
.word-add-card .field-label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:block;font-weight:600}
.word-add-card .field-label-text{color:var(--warm)}

/* Book styles */
.book-read-msg{background:rgba(148,161,135,.12);border:1.5px solid rgba(148,161,135,.3);border-radius:1.25rem;padding:20px;text-align:center}
.book-read-msg .big{font-size:44px;margin-bottom:12px}
.book-read-msg .title{font-family:'Lora',serif;font-style:italic;font-size:18px;color:var(--warm);margin-bottom:8px;font-weight:600}
.book-read-msg .desc{font-size:13px;color:#888;line-height:1.5}

/* Google Sign In */
#google_signin_button{margin:16px 0}


/* Book reader */
.book-text{font-family:'Lora',serif;font-size:17px;line-height:1.85;color:var(--warm);padding:4px}
.book-word{cursor:pointer;border-radius:4px;padding:0 1px;transition:background .15s;display:inline}
.book-word:hover{background:rgba(212,165,165,.2)}
.book-word.highlighted{background:rgba(212,165,165,.25);font-weight:600}
.word-popup{position:fixed;background:#fff;border:1.5px solid var(--border);border-radius:1.25rem;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,.12);z-index:200;max-width:280px;min-width:200px}
.level-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.level-A1{background:rgba(148,161,135,.15);color:var(--sage)}
.level-A2{background:rgba(184,181,208,.15);color:var(--lavender)}
.level-B1{background:rgba(212,165,165,.15);color:var(--rose)}
.level-B2{background:rgba(74,68,63,.1);color:var(--warm)}

/* Achievements */
.ach-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:1.25rem;border:1.5px solid var(--border);margin-bottom:8px;transition:all .2s}
.ach-card.unlocked{background:rgba(212,165,165,.06);border-color:rgba(212,165,165,.25)}
.ach-card.locked{opacity:.45;filter:grayscale(.6)}
.ach-icon{font-size:28px;width:44px;text-align:center}
.ach-title{font-weight:600;font-size:14px}
.ach-desc{font-size:12px;color:#aaa;margin-top:1px}

/* Irregular cards (flip) */
.flip-card{perspective:800px;width:100%;height:180px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:1.75rem;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.flip-front{background:linear-gradient(135deg,rgba(212,165,165,.18),rgba(184,181,208,.15));border:1.5px solid rgba(212,165,165,.22)}
.flip-back{background:linear-gradient(135deg,rgba(148,161,135,.15),rgba(184,181,208,.12));border:1.5px solid rgba(148,161,135,.25);transform:rotateY(180deg)}

/* Topic manager */
.topic-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:rgba(255,255,255,.7);cursor:pointer;transition:all .18s;margin:4px}
.topic-chip.active{background:var(--rose);color:#fff;border-color:transparent}

@media(max-width:480px){
  .app{padding:12px 12px 84px}
  .card{padding:1.1rem;border-radius:1.4rem}
  .study-word{font-size:26px}
  .stat-num{font-size:22px}
  .menu-card{padding:14px 10px;border-radius:1.25rem}
  .menu-card .icon{font-size:18px}
  .menu-card .title{font-size:13px}
  .book-text{font-size:16px;line-height:1.8}
}
</style>
</head>

const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const normalize=s=>s.toLowerCase().trim().replace(/[.,!?;:'"`]/g,'').replace(/\s+/g,' ');
const isCorrect=(ans,exp)=>{const a=normalize(ans);const v=exp.split(/[,/;]|\s\(|\)/g).map(normalize).filter(Boolean);return v.some(x=>x===a||a.includes(x)||x.includes(a));};

  const unlocked=app.stats.achievements||[];

function beep(ok){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(ok?660:220,c.currentTime);o.frequency.setValueAtTime(ok?880:180,c.currentTime+0.08);g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.2);o.start();o.stop(c.currentTime+0.2);}catch(e){}}

// ────── STUDY PAGE ──────
function StudyPage({app,setApp,sessionType,exit}){
  const[stage,setStage]=useState('mode');
  const[mode,setMode]=useState('choice');
  const[micGranted,setMicGranted]=useState(null);
  const[dir,setDir]=useState('en-ru');
  const[queue,setQueue]=useState([]);
  const[idx,setIdx]=useState(0);
  const[answered,setAnswered]=useState(false);
  const[ans,setAns]=useState('');
  const[ok,setOk]=useState(null);
  const[hint,setHint]=useState(false);
  const[score,setScore]=useState({c:0,w:0});
  const[recog,setRecog]=useState(false);
  const[recMsg,setRecMsg]=useState('');
  const inputRef=useRef(null);
  const cur=queue[idx];
  const pDir=cur?(dir==='mixed'?(cur.id.charCodeAt(0)+idx)%2===0?'en-ru':'ru-en':dir):'en-ru';
  const prompt=cur?(pDir==='en-ru'?cur.en:cur.ru):'';
  const expected=cur?(pDir==='en-ru'?cur.ru:cur.en):'';
  const aLang=pDir==='en-ru'?'ru-RU':'en-US';
  const choices=useMemo(()=>{if(!cur||mode!=='choice')return[];const others=app.words.filter(w=>w.id!==cur.id).map(w=>pDir==='en-ru'?w.ru:w.en);return shuffle([expected,...shuffle(others).slice(0,3)]);},[cur?.id,mode,pDir,expected]);
  useEffect(()=>{if(mode==='written')setTimeout(()=>{if(inputRef.current)inputRef.current.focus();},200);},[cur?.id]);

  function handleAns(a){
    if(!cur||answered)return;
    const dontRemember=a==='__dont_remember__';
    const correct=dontRemember?false:isCorrect(a,expected);
    if(dontRemember)a=expected;
    setOk(correct);setAnswered(true);setAns(a);beep(correct);
    // Only speak in non-cards modes and not immediately
    if(mode!=='cards'&&mode!=='voice'){
      setTimeout(()=>speak(cur.en),400);
    }
    setScore(s=>({c:s.c+(correct?1:0),w:s.w+(correct?0:1)}));
    const today=todayStr();
    const nw=app.words.map(w=>{if(w.id!==cur.id)return w;return{...w,correct:w.correct+(correct?1:0),wrong:w.wrong+(correct?0:1),streak:correct?w.streak+1:0,learned:correct?(sessionType==='learn'||w.learned):w.learned,learnedDate:correct&&sessionType==='learn'&&!w.learned?today:w.learnedDate,lastReviewed:correct?today:w.lastReviewed};});
    const ds={...(app.stats.daily?.[today]||{date:today,learned:0,reviewed:0,correct:0,wrong:0})};
    if(correct)ds.correct++;else ds.wrong++;
    if(sessionType==='learn'&&correct&&!cur.learned)ds.learned++;
    if(sessionType!=='learn')ds.reviewed++;
    const newApp={...app,words:nw,stats:{...app.stats,daily:{...app.stats.daily,[today]:ds}}};
    const newAchs=checkAchievements(newApp);
    if(newAchs.length>0)newApp.stats.achievements=[...(newApp.stats.achievements||[]),...newAchs];
    setApp(newApp);
  }

  function next(){if(idx+1>=queue.length)setStage('done');else{setIdx(idx+1);setAnswered(false);setAns('');setOk(null);setHint(false);}}

  function startRecog(){
    if(startRecog._r){try{startRecog._r.abort();}catch(e){}startRecog._r=null;}
    setTimeout(()=>{
      setRecog(true);setRecMsg('');
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR){setRecog(false);setRecMsg('browser');return;}
      try{
        const r=new SR();startRecog._r=r;r.lang=aLang;r.maxAlternatives=1;r.continuous=false;r.interimResults=false;
        r.onresult=e=>{startRecog._r=null;const t=Array.from(e.results).map(x=>x[0].transcript).join('').trim();if(t){handleAns(t);setRecog(false);setRecMsg('');}else{setRecMsg('no-speech');setRecog(false);}};
        r.onerror=e=>{startRecog._r=null;if(e.error==='not-allowed'||e.error==='permission-denied')setRecMsg('not-allowed');else setRecMsg('');setRecog(false);};
        r.onend=()=>{startRecog._r=null;setRecog(false);};r.start();
      }catch(err){startRecog._r=null;setRecMsg('');setRecog(false);}
    },200);
  }

  function getPool(){
    if(sessionType==='learn')return app.words.filter(w=>!w.learned);
    if(sessionType==='review')return app.words.filter(w=>w.learned&&getNextReviewTime(w)===0);
    return app.words.filter(w=>w.learned);
  }

  if(stage==='mode'){
    if(sessionType==='learn'){
      // For learning: ONLY cards mode
      setMode('cards');
      setStage('dir');
      return null;
    }
    return(
    <div className="fade-in">
      <button className="back-btn" onClick={exit}>← Назад</button>
      <h2 className="section-title" style={{textAlign:'center',marginTop:16}}>Как повторяем?</h2>
      <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:10}}>
        {[{v:'cards',l:'🃏 Карточки',s:'Флип-карточки'},{v:'choice',l:'🎯 Выбор варианта',s:'Выбери из 4 вариантов'},{v:'written',l:'✍️ Письменно',s:'Напиши ответ'},{v:'voice',l:'🎤 Голосом',s:'Произнеси ответ'}].map(m=>(
          <button key={m.v} className="card btn" style={{textAlign:'left',padding:18}} onClick={()=>{if(m.v==='voice'&&micGranted===null){navigator.mediaDevices&&navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{s.getTracks().forEach(t=>t.stop());setMicGranted(true);setMode('voice');setStage('dir');}).catch(()=>setMicGranted(false));return;}setMode(m.v);setStage('dir');}}>
            <div style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:18}}>{m.l}</div>
            <div style={{fontSize:12,color:'#aaa',marginTop:4}}>{m.s}</div>
          </button>
        ))}
      </div>
    </div>
  );}

  if(stage==='dir'){return(
    <div className="fade-in">
      <button className="back-btn" onClick={()=>setStage('mode')}>← Назад</button>
      <h2 className="section-title" style={{textAlign:'center',marginTop:16}}>Направление</h2>
      <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:10}}>
        {[{v:'en-ru',l:'English → Русский'},{v:'ru-en',l:'Русский → English'},{v:'mixed',l:'Смешанный режим'}].map(d=>(
          <button key={d.v} className="card btn" style={{textAlign:'left',padding:18}} onClick={()=>{setDir(d.v);const pool=getPool();const withErrors=shuffle(pool.filter(w=>w.wrong>w.correct));const rest=shuffle(pool.filter(w=>w.wrong<=w.correct));setQueue([...withErrors,...rest].slice(0,15));setIdx(0);setAnswered(false);setAns('');setOk(null);setHint(false);setScore({c:0,w:0});setStage('session');}}>
            <div style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:18}}>{d.l}</div>
          </button>
        ))}
      </div>
    </div>
  );}

  if(stage==='done'){return(
    <div className="fade-in" style={{textAlign:'center',paddingTop:40}}>
      <div style={{fontSize:56}}>🕊️</div>
      <h2 className="section-title">Отлично!</h2>
      <p className="sub-text">Сессия завершена</p>
      <div className="card" style={{marginTop:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div><div className="stat-num" style={{color:'var(--sage)'}}>{score.c}</div><div className="stat-label">верно</div></div>
        <div><div className="stat-num" style={{color:'var(--rose)'}}>{score.w}</div><div className="stat-label">ошибки</div></div>
      </div>

// ────── ADD PAGE ──────
function AddPage({app,setApp,back}){
  const[tab,setTab]=useState('one');
  const[en,setEn]=useState('');const[ru,setRu]=useState('');
  const[pos,setPos]=useState('noun');const[topic,setTopic]=useState('general');
  const[note,setNote]=useState('');const[msg,setMsg]=useState('');
  const[bulk,setBulk]=useState('');const[bPos,setBPos]=useState('noun');const[bTopic,setBTopic]=useState('general');
  // Photo OCR
  const[img,setImg]=useState(null);const[ocrText,setOcrText]=useState('');
  const[parsing,setParsing]=useState(false);const[prog,setProg]=useState(0);
  const[parsed,setParsed]=useState([]);const[review,setReview]=useState(false);
  const[pPos,setPPos]=useState('noun');const[pTopic,setPTopic]=useState('general');
  const fileRef=useRef(null);
  // New topic/pos creation
  const[newTopicName,setNewTopicName]=useState('');const[newTopicEmoji,setNewTopicEmoji]=useState('');
  const[newPosName,setNewPosName]=useState('');const[newPosKey,setNewPosKey]=useState('');
  const[showTopicForm,setShowTopicForm]=useState(false);const[showPosForm,setShowPosForm]=useState(false);
  const[classifying,setClassifying]=useState(false);
  const[pendingWord,setPendingWord]=useState(null);
  const[detectedClassification,setDetectedClassification]=useState(null);
  const allPos={...POS_DEFAULT,...(app.customPos||{})};
  const allTopics={...TOPICS_DEFAULT,...(app.customTopics||{})};

  function handleFile(f){if(!f)return;const r=new FileReader();r.onload=()=>setImg(r.result);r.readAsDataURL(f);}
  async function doOCR(){
    if(!img)return;
    setParsing(true);setProg(0);setParsed([]);setReview(false);
    try{
      // Use Claude API to extract words from image
      const base64=img.split(',')[1];
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-calls':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1500,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
            {type:'text',text:'This is a handwritten vocabulary list. Extract all word pairs in format "english — russian". Return ONLY a JSON array like [{"en":"word","ru":"перевод"},...]. No other text.'}
          ]}]
        })
      });
      const data=await res.json();
      const text=data.content?.[0]?.text||'';
      const clean=text.replace(/```json|```/g,'').trim();
      const pairs=JSON.parse(clean);
      setParsed(pairs);setReview(true);
    }catch(e){
      // fallback: manual text parse
      setMsg('Не удалось распознать. Попробуй вкладку Список.');
      setTimeout(()=>setMsg(''),3000);
    }
    setParsing(false);
  }
  function addPhoto(){
    const valid=parsed.filter(w=>w.en&&w.en.trim());
    if(!valid.length){setMsg('Нет слов');return;}
    const nw=valid.map(w=>({id:uid(),en:w.en.trim(),ru:(w.ru||'—').trim(),partOfSpeech:pPos,topic:pTopic,note:'',learned:false,learnedDate:null,lastReviewed:null,correct:0,wrong:0,streak:0,created:new Date().toISOString()}));
    const words=[...app.words,...nw];setApp({...app,words});saveData({...app,words});
    setImg(null);setOcrText('');setParsed([]);setReview(false);
    setMsg('✅ Добавлено '+nw.length+' слов!');setTimeout(()=>setMsg(''),3000);
  }
  function updateParsed(i,field,v){setParsed(p=>p.map((w,j)=>j===i?{...w,[field]:v}:w));}
  function removeParsed(i){setParsed(p=>p.filter((_,j)=>j!==i));}

  async function addOne(){
    if(!en.trim()||!ru.trim())return;
    setClassifying(true);
    // Ask Claude to classify POS and topic
    let detectedPos=pos;let detectedTopic=topic;let newTopicCreated=null;let newPosCreated=null;
    try{
      const existingTopics=Object.entries({...TOPICS_DEFAULT,...(app.customTopics||{})}).map(([k,v])=>k+':'+v).join(', ');
      const existingPos=Object.entries({...POS_DEFAULT,...(app.customPos||{})}).map(([k,v])=>k+':'+v).join(', ');
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-calls':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:200,
          system:'You classify English vocabulary. Reply ONLY with compact JSON, no markdown. Available parts of speech: '+existingPos+'. Available topics: '+existingTopics+'. If a word fits an existing category, use its key. If it truly needs a new category (rare), include newTopic or newPos fields.',
          messages:[{role:'user',content:'Word: "'+en.trim()+'" ('+ru.trim()+'). Reply JSON: {"pos":"key","topic":"key"} or with optional "newTopic":{"key":"...","label":"emoji name"} or "newPos":{"key":"...","label":"name"}'}]
        })
      });
      const data=await res.json();
      const text=data?.content?.[0]?.text?.trim().replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(text);
      if(parsed.pos)detectedPos=parsed.pos;
      if(parsed.topic)detectedTopic=parsed.topic;
      if(parsed.newTopic){newTopicCreated=parsed.newTopic;}
      if(parsed.newPos){newPosCreated=parsed.newPos;}
    }catch(e){}
    setClassifying(false);
    // Apply new categories if created
    let updatedApp={...app};
    if(newTopicCreated?.key&&newTopicCreated?.label){updatedApp={...updatedApp,customTopics:{...(updatedApp.customTopics||{}),[newTopicCreated.key]:newTopicCreated.label}};}
    if(newPosCreated?.key&&newPosCreated?.label){updatedApp={...updatedApp,customPos:{...(updatedApp.customPos||{}),[newPosCreated.key]:newPosCreated.label}};}
    const allTopicsNow={...TOPICS_DEFAULT,...(updatedApp.customTopics||{})};
    const allPosNow={...POS_DEFAULT,...(updatedApp.customPos||{})};
    const w={id:uid(),en:en.trim(),ru:ru.trim(),partOfSpeech:detectedPos,topic:detectedTopic,note:note.trim(),learned:false,learnedDate:null,lastReviewed:null,correct:0,wrong:0,streak:0,created:new Date().toISOString()};
    const words=[...updatedApp.words,w];
    const na={...updatedApp,words};const achs=checkAchievements(na);if(achs.length)na.stats={...na.stats,achievements:[...(na.stats.achievements||[]),...achs]};
    setApp(na);
    // Show classification result for review
    setPendingWord(w);
    setDetectedClassification({pos:detectedPos,topic:detectedTopic,posLabel:allPosNow[detectedPos]||detectedPos,topicLabel:allTopicsNow[detectedTopic]||detectedTopic,newTopic:newTopicCreated,newPos:newPosCreated});
    setEn('');setRu('');setNote('');
  }
  function addBulk(){
    const lines=bulk.split('\n').map(l=>l.trim()).filter(Boolean);
    const nw=[];
    for(const l of lines){const m=l.match(/^(.+?)\s*[\u2014\u2013\-:]\s*(.+)$/);if(!m)continue;nw.push({id:uid(),en:m[1].trim(),ru:m[2].trim()||'—',partOfSpeech:bPos,topic:bTopic,note:'',learned:false,learnedDate:null,lastReviewed:null,correct:0,wrong:0,streak:0,created:new Date().toISOString()});}
    if(!nw.length){setMsg('Не удалось распознать');return;}
    const words=[...app.words,...nw];setApp({...app,words});setBulk('');setMsg('✅ '+nw.length+' слов добавлено');setTimeout(()=>setMsg(''),2500);
  }
  function addCustomTopic(){
    if(!newTopicName.trim())return;
    const key='custom_'+uid().slice(0,6);
    const label=(newTopicEmoji||'📌')+' '+newTopicName.trim();
    const ct={...(app.customTopics||{}),[key]:label};
    setApp({...app,customTopics:ct});
    setNewTopicName('');setNewTopicEmoji('');setShowTopicForm(false);
    setMsg('✅ Тема «'+newTopicName.trim()+'» создана');setTimeout(()=>setMsg(''),2000);
  }
  function addCustomPos(){
    if(!newPosName.trim()||!newPosKey.trim())return;
    const key=newPosKey.trim().toLowerCase().replace(/\s+/g,'_');
    const cp={...(app.customPos||{}),[key]:newPosName.trim()};
    setApp({...app,customPos:cp});
    setNewPosName('');setNewPosKey('');setShowPosForm(false);
    setMsg('✅ Часть речи «'+newPosName.trim()+'» создана');setTimeout(()=>setMsg(''),2000);
  }

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <button className="back-btn" onClick={back}>← Назад</button>
        <h2 className="section-title" style={{margin:0}}>Добавить</h2><span/>
      </div>
      {msg&&<div className="card" style={{textAlign:'center',marginBottom:12,padding:11,fontSize:14,color:'var(--sage)'}}>{msg}</div>}
      {classifying&&<div className="card" style={{textAlign:'center',marginBottom:12,padding:16}}>
        <div style={{fontSize:13,color:'var(--lavender)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <span style={{animation:'pulse 1.2s infinite',display:'inline-block'}}>✨</span> Claude определяет часть речи и тему...
        </div>
      </div>}
      {detectedClassification&&pendingWord&&(
        <div className="card fade-in" style={{marginBottom:14,border:'1.5px solid rgba(148,161,135,.3)',background:'rgba(148,161,135,.05)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <div style={{fontWeight:600,fontSize:15}}>{pendingWord.en} — {pendingWord.ru}</div>
              <div style={{fontSize:11,color:'var(--sage)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:2}}>добавлено в словарь ✓</div>
            </div>
            <button style={{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:16}} onClick={()=>{setPendingWord(null);setDetectedClassification(null);}}>✕</button>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
            <div style={{background:'rgba(212,165,165,.1)',borderRadius:12,padding:'6px 12px'}}>
              <div style={{fontSize:10,color:'#bbb',textTransform:'uppercase',letterSpacing:'.06em'}}>Часть речи</div>
              <div style={{fontSize:13,fontWeight:600,marginTop:2}}>{detectedClassification.posLabel}</div>
              {detectedClassification.newPos&&<div style={{fontSize:10,color:'var(--rose)',marginTop:1}}>✨ новая категория</div>}
            </div>
            <div style={{background:'rgba(148,161,135,.1)',borderRadius:12,padding:'6px 12px'}}>
              <div style={{fontSize:10,color:'#bbb',textTransform:'uppercase',letterSpacing:'.06em'}}>Тема</div>
              <div style={{fontSize:13,fontWeight:600,marginTop:2}}>{detectedClassification.topicLabel}</div>
              {detectedClassification.newTopic&&<div style={{fontSize:10,color:'var(--sage)',marginTop:1}}>✨ новая тема создана</div>}
            </div>
          </div>
          <ClassificationEditor
            word={pendingWord}
            app={app}
            setApp={setApp}
            allPos={{...POS_DEFAULT,...(app.customPos||{})}}
            allTopics={{...TOPICS_DEFAULT,...(app.customTopics||{})}}
            onDone={()=>{setPendingWord(null);setDetectedClassification(null);}}
          />
        </div>
      )}
      <div className="tabs" style={{marginBottom:14}}>
        <button className={`tab ${tab==='photo'?'active':''}`} onClick={()=>{setTab('photo');setReview(false);}}>📸 Фото</button>
        <button className={`tab ${tab==='one'?'active':''}`} onClick={()=>setTab('one')}>✍️ Одно</button>
        <button className={`tab ${tab==='bulk'?'active':''}`} onClick={()=>setTab('bulk')}>📋 Список</button>
        <button className={`tab ${tab==='manage'?'active':''}`} onClick={()=>setTab('manage')}>⚙️ Темы</button>
      </div>

      {tab==='photo'&&!review&&(
        <div className="card" style={{textAlign:'center'}}>
          <h3 className="section-title" style={{fontSize:18}}>Фото страницы</h3>
          <p style={{fontSize:12,color:'#aaa',margin:'6px 0 18px'}}>Сфотографируй список слов — Claude распознает их автоматически</p>
          {!img?(
            <button className="btn" style={{width:'100%',padding:36,border:'2px dashed rgba(212,165,165,.3)',borderRadius:'2rem',display:'flex',flexDirection:'column',alignItems:'center',gap:8}} onClick={()=>fileRef.current?.click()}>
              <span style={{fontSize:36}}>📷</span>
              <span style={{fontSize:14,color:'var(--rose)',fontWeight:500}}>Выбрать фото</span>
            </button>
          ):(
            <div>
              <img src={img} style={{width:'100%',maxHeight:220,objectFit:'cover',borderRadius:16,marginBottom:12}}/>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-outline btn-sm" style={{flex:1}} onClick={()=>setImg(null)}>Другое фото</button>
                <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={doOCR} disabled={parsing}>{parsing?'⏳ Распознаю...':'🔍 Распознать'}</button>
              </div>
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" onChange={e=>handleFile(e.target.files[0])} className="hidden-input"/>
        </div>
      )}
      {tab==='photo'&&review&&(
        <div className="fade-in">
          <div className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <h3 className="section-title" style={{fontSize:18,margin:0}}>Распознано {parsed.length} слов</h3>
              <button className="btn btn-ghost" onClick={()=>setReview(false)}>← Назад</button>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <select className="select" style={{flex:1}} value={pPos} onChange={e=>setPPos(e.target.value)}>
                {Object.entries(allPos).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>
              <select className="select" style={{flex:1}} value={pTopic} onChange={e=>setPTopic(e.target.value)}>
                {Object.entries(allTopics).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            <div style={{maxHeight:320,overflowY:'auto',marginBottom:12}}>
              {parsed.map((w,i)=>(
                <div key={i} className="word-row">
                  <input value={w.en} onChange={e=>updateParsed(i,'en',e.target.value)} placeholder="English" style={{flex:1,minWidth:80}}/>
                  <span style={{color:'#ddd'}}>—</span>
                  <input value={w.ru} onChange={e=>updateParsed(i,'ru',e.target.value)} placeholder="Перевод" style={{flex:1,minWidth:80}}/>
                  <button className="del" style={{color:'var(--rose)',cursor:'pointer',border:'none',background:'none',fontSize:18,padding:'0 4px'}} onClick={()=>removeParsed(i)}>✕</button>
                </div>
              ))}
            </div>
            <button className="btn btn-primary" style={{width:'100%',padding:14}} onClick={addPhoto}>✅ Добавить {parsed.length} слов</button>
          </div>
        </div>
      )}

      {tab==='one'&&(
        <div className="card">
          <input className="input" value={en} onChange={e=>setEn(e.target.value)} placeholder="English" style={{marginBottom:8}}/>
          <input className="input" value={ru} onChange={e=>setRu(e.target.value)} placeholder="Перевод" style={{marginBottom:8}}/>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <select className="select" style={{flex:1}} value={pos} onChange={e=>setPos(e.target.value)}>
              {Object.entries(allPos).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
            <select className="select" style={{flex:1}} value={topic} onChange={e=>setTopic(e.target.value)}>
              {Object.entries(allTopics).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
          </div>
          <input className="input" value={note} onChange={e=>setNote(e.target.value)} placeholder="Заметка (необязательно)" style={{marginBottom:12}}/>
          <button className="btn btn-primary" style={{width:'100%',padding:14}} onClick={addOne} disabled={!en.trim()||!ru.trim()||classifying}>{classifying?'✨ Определяю...':'Добавить в словарь'}</button>
        </div>
      )}

      {tab==='bulk'&&(
        <div className="card">
          <p style={{fontSize:12,color:'#aaa',marginBottom:10}}>Формат: слово — перевод (каждое на новой строке)</p>
          <textarea className="textarea" value={bulk} onChange={e=>setBulk(e.target.value)} rows={7} placeholder={`such - такой\ngenius - гений\nby the way - кстати`} style={{marginBottom:10}}/>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <select className="select" style={{flex:1}} value={bPos} onChange={e=>setBPos(e.target.value)}>
              {Object.entries(allPos).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
            <select className="select" style={{flex:1}} value={bTopic} onChange={e=>setBTopic(e.target.value)}>
              {Object.entries(allTopics).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
          </div>
          <button className="btn btn-secondary" style={{width:'100%',padding:14}} onClick={addBulk}>Добавить все</button>
        </div>
      )}

      {tab==='manage'&&(
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <h3 style={{fontSize:14,fontWeight:600}}>Темы</h3>
              <button className="btn btn-ghost" style={{fontSize:13}} onClick={()=>setShowTopicForm(v=>!v)}>+ Создать</button>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:showTopicForm?12:0}}>
              {Object.entries(allTopics).map(([k,v])=>(
                <span key={k} style={{display:'inline-flex',alignItems:'center',gap:4,background:'rgba(245,230,211,.3)',borderRadius:999,padding:'4px 10px',fontSize:12}}>
                  {v}
                  {app.customTopics?.[k]&&<button style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'#ccc',padding:0}} onClick={()=>{const ct={...app.customTopics};delete ct[k];setApp({...app,customTopics:ct});}}>✕</button>}
                </span>
              ))}
            </div>
            {showTopicForm&&(
              <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
                <div style={{display:'flex',gap:8}}>
                  <input className="input" value={newTopicEmoji} onChange={e=>setNewTopicEmoji(e.target.value)} placeholder="Эмодзи" style={{width:70}}/>
                  <input className="input" value={newTopicName} onChange={e=>setNewTopicName(e.target.value)} placeholder="Название темы"/>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={addCustomTopic} disabled={!newTopicName.trim()}>Создать тему</button>
                  <button className="btn btn-outline btn-sm" style={{flex:1}} onClick={()=>setShowTopicForm(false)}>Отмена</button>
                </div>
              </div>
            )}
          </div>
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <h3 style={{fontSize:14,fontWeight:600}}>Части речи</h3>
              <button className="btn btn-ghost" style={{fontSize:13}} onClick={()=>setShowPosForm(v=>!v)}>+ Создать</button>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:showPosForm?12:0}}>
              {Object.entries(allPos).map(([k,v])=>(
                <span key={k} style={{display:'inline-flex',alignItems:'center',gap:4,background:'rgba(245,230,211,.3)',borderRadius:999,padding:'4px 10px',fontSize:12}}>
                  {v}
                  {app.customPos?.[k]&&<button style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'#ccc',padding:0}} onClick={()=>{const cp={...app.customPos};delete cp[k];setApp({...app,customPos:cp});}}>✕</button>}
                </span>
              ))}
            </div>
            {showPosForm&&(
              <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
                <input className="input" value={newPosName} onChange={e=>setNewPosName(e.target.value)} placeholder="Название (напр: Союз)"/>
                <input className="input" value={newPosKey} onChange={e=>setNewPosKey(e.target.value)} placeholder="Код (напр: conjunction)"/>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={addCustomPos} disabled={!newPosName.trim()||!newPosKey.trim()}>Создать</button>
                  <button className="btn btn-outline btn-sm" style={{flex:1}} onClick={()=>setShowPosForm(false)}>Отмена</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ────── IRREGULAR PAGE ──────
function IrregularPage({app,setApp,back}){
  const[search,setSearch]=useState('');
  const[editing,setEditing]=useState(null);
  const[edit,setEdit]=useState({});
  const[mode,setMode]=useState('list'); // list | cards | practice
  const[cardIdx,setCardIdx]=useState(0);
  const[cardFlipped,setCardFlipped]=useState(false);
  const[pIdx,setPIdx]=useState(0);
  const[pPast,setPPast]=useState('');const[pPP,setPPP]=useState('');
  const[pChecked,setPChecked]=useState(false);
  const[pScore,setPScore]=useState({c:0,w:0});
  const[filterLearned,setFilterLearned]=useState('all'); // all|learned|new
  const filtered=app.irregular.filter(v=>{
    const s=search.toLowerCase();
    if(filterLearned==='learned'&&!v.learned)return false;
    if(filterLearned==='new'&&v.learned)return false;
    return!s||v.base.toLowerCase().includes(s)||v.past.toLowerCase().includes(s)||v.participle.toLowerCase().includes(s)||v.ru.includes(s);
  });

  function saveEdit(){const ni=app.irregular.map(v=>v.id===editing?{...v,...edit}:v);setApp({...app,irregular:ni});setEditing(null);}
  function cancelEdit(){const orig=app.irregular.find(v=>v.id===editing);if(orig&&!orig.base&&!orig.past&&!orig.participle&&!orig.ru){const ni=app.irregular.filter(v=>v.id!==editing);setApp({...app,irregular:ni});}setEditing(null);}
  function toggleLearnVerb(id){const ni=app.irregular.map(v=>v.id===id?{...v,learned:!v.learned,learnedDate:!v.learned?todayStr():null}:v);const na={...app,irregular:ni};const achs=checkAchievements(na);if(achs.length)na.stats={...na.stats,achievements:[...(na.stats.achievements||[]),...achs]};setApp(na);}
  function addVerb(){const v={id:uid(),base:'',past:'',participle:'',ru:'',learned:false,learnedDate:null,streak:0};setApp({...app,irregular:[...app.irregular,v]});setEditing(v.id);setEdit(v);}

  // CARDS mode
  if(mode==='cards'){
    const pool=filtered;
    if(pool.length===0)return<div className="fade-in"><button className="back-btn" onClick={()=>setMode('list')}>← Назад</button><div style={{textAlign:'center',padding:40,color:'#ccc'}}>Нет глаголов</div></div>;
    const cur=pool[cardIdx%pool.length];
    return(
      <div className="fade-in">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <button className="back-btn" onClick={()=>{setMode('list');setCardIdx(0);setCardFlipped(false);}}>← Назад</button>
          <span className="badge">{(cardIdx%pool.length)+1}/{pool.length}</span>
          <button className="btn btn-ghost" style={{fontSize:13}} onClick={()=>toggleLearnVerb(cur.id)}>{cur.learned?'↩️ Убрать':'✅ Выучил'}</button>
        </div>
        <div className="flip-card" onClick={()=>setCardFlipped(f=>!f)}>
          <div className={`flip-inner ${cardFlipped?'flipped':''}`}>
            <div className="flip-front">
              <div style={{fontSize:13,color:'#aaa',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:12}}>Infinitive</div>
              <div style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:38,marginBottom:8}}>{cur.base}</div>
              <div style={{color:'#aaa',fontSize:15}}>{cur.ru}</div>
              <div style={{marginTop:16,fontSize:12,color:'#ccc'}}>Нажми чтобы увидеть формы</div>
            </div>
            <div className="flip-back">
              <div style={{fontSize:13,color:'#aaa',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:12}}>{cur.base}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,width:'100%'}}>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#aaa',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>Past (V2)</div>
                  <div style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:600,color:'var(--rose)'}}>{cur.past}</div>
                </div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#aaa',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>Participle (V3)</div>
                  <div style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:600,color:'var(--sage)'}}>{cur.participle}</div>
                </div>
              </div>
              <div style={{marginTop:16,display:'flex',gap:8}}>
                <button className="speak-btn" style={{fontSize:18,opacity:1}} onClick={e=>{e.stopPropagation();speak(cur.base);}}>🔊</button>
                <button className="speak-btn" style={{fontSize:18,opacity:1}} onClick={e=>{e.stopPropagation();speak(cur.past);}}>🔊</button>
                <button className="speak-btn" style={{fontSize:18,opacity:1}} onClick={e=>{e.stopPropagation();speak(cur.participle);}}>🔊</button>
              </div>
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:20}}>
          <button className="btn btn-outline" style={{flex:1,padding:14}} onClick={()=>{setCardIdx(i=>(i-1+pool.length)%pool.length);setCardFlipped(false);}}>← Назад</button>
          <button className="btn btn-primary" style={{flex:1,padding:14}} onClick={()=>{setCardIdx(i=>(i+1)%pool.length);setCardFlipped(false);}}>Дальше →</button>
        </div>
      </div>
    );
  }

  // PRACTICE mode
  if(mode==='practice'){
    const pool=app.irregular;
    if(pool.length===0)return<div className="fade-in"><button className="back-btn" onClick={()=>setMode('list')}>← Назад</button><div style={{textAlign:'center',padding:40,color:'#ccc'}}>Нет глаголов</div></div>;
    const cur=pool[pIdx];
    function check(){setPChecked(true);const ok=pPast.trim().toLowerCase()===cur.past.toLowerCase()&&pPP.trim().toLowerCase()===cur.participle.toLowerCase();setPScore(s=>({c:s.c+(ok?1:0),w:s.w+(ok?0:1)}));if(ok){const ni=app.irregular.map(v=>v.id===cur.id?{...v,learned:true,learnedDate:todayStr()}:v);const na={...app,irregular:ni};const achs=checkAchievements(na);if(achs.length)na.stats={...na.stats,achievements:[...(na.stats.achievements||[]),...achs]};setApp(na);}}
    function next(){if(pIdx+1>=pool.length){setMode('list');return;}setPIdx(pIdx+1);setPPast('');setPPP('');setPChecked(false);}
    return(
      <div className="fade-in">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <button className="back-btn" onClick={()=>{setMode('list');setPIdx(0);setPPast('');setPPP('');setPChecked(false);}}>← Выйти</button>
          <span className="badge">{pIdx+1}/{pool.length}</span>
          <span style={{fontSize:12}}><span style={{color:'var(--sage)'}}>✓{pScore.c}</span> <span style={{color:'var(--rose)'}}>✗{pScore.w}</span></span>
        </div>
        <div className="card" style={{textAlign:'center'}}>
          <div style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:32}}>{cur.base}</div>
          <div style={{color:'#aaa',fontSize:14,marginBottom:20}}>{cur.ru}</div>
          <div style={{textAlign:'left'}}>
            <label style={{fontSize:12,color:'#aaa',textTransform:'uppercase',letterSpacing:'.05em'}}>Past Simple (V2)</label>
            <input className="input" style={{marginTop:4,fontSize:16,marginBottom:12}} value={pPast} onChange={e=>setPPast(e.target.value)} disabled={pChecked}/>
            {pChecked&&pPast.trim().toLowerCase()!==cur.past.toLowerCase()&&<div style={{fontSize:12,color:'var(--rose)',marginBottom:8}}>Правильно: {cur.past}</div>}
            <label style={{fontSize:12,color:'#aaa',textTransform:'uppercase',letterSpacing:'.05em'}}>Past Participle (V3)</label>
            <input className="input" style={{marginTop:4,fontSize:16}} value={pPP} onChange={e=>setPPP(e.target.value)} disabled={pChecked}/>
            {pChecked&&pPP.trim().toLowerCase()!==cur.participle.toLowerCase()&&<div style={{fontSize:12,color:'var(--rose)',marginTop:4}}>Правильно: {cur.participle}</div>}
          </div>
          {!pChecked?<button className="btn btn-primary" style={{width:'100%',marginTop:20,padding:14}} onClick={check}>Проверить</button>
          :<button className="btn btn-secondary" style={{width:'100%',marginTop:20,padding:14}} onClick={next}>{pIdx+1>=pool.length?'Завершить':'Дальше →'}</button>}
        </div>
      </div>
    );
  }

  // LIST mode
  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <button className="back-btn" onClick={back}>← Назад</button>
        <h2 className="section-title" style={{margin:0}}>Глаголы ({app.irregular.length})</h2><span/>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <input className="input" placeholder="Поиск..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:120}}/>
        <select className="select" value={filterLearned} onChange={e=>setFilterLearned(e.target.value)}>
          <option value="all">Все</option>
          <option value="new">Новые</option>
          <option value="learned">Выученные</option>
        </select>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>

function getDailyStory(level){
  const dayOfYear=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/(864e5));
  const levels=Object.keys(BOOK_STORIES);
  // rotate daily per level
  const variants=Object.values(BOOK_STORIES).filter(s=>s.level===level);
  return BOOK_STORIES[level]; // single story per level for now, daily = same
}
// Get "today's featured" story — cycles through levels
function getTodaysFeatured(){
  const dayOfYear=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/(864e5));
  const levels=['A1','A2','B1','B2'];
  return levels[dayOfYear%levels.length];
}

function ReaderPage({app,setApp,back}){
  const[selectedLevel,setSelectedLevel]=useState(null);

  const[popupWord,setPopupWord]=useState(null);
  const[popupPos,setPopupPos]=useState({x:0,y:0});
  const[addedWords,setAddedWords]=useState({});
  const[toast,setToast]=useState('');
  const textRef=useRef(null);
  
  const today=todayStr();
  const todayFeatured=getTodaysFeatured();
  
  // NEW: Track which story user read today (per level)
  const dailyBooksRead=app.stats.dailyBooksRead||{};
  const todayReadLevels=dailyBooksRead[today]||[];
  const isLevelReadToday=selectedLevel?todayReadLevels.includes(selectedLevel):false;

  function handleWordClick(word,e){
    const clean=word.replace(/[^a-zA-Z'\-]/g,'').toLowerCase();
    if(clean.length<2)return;
    const rect=e.target.getBoundingClientRect();
    const x=Math.min(rect.left,window.innerWidth-290);
    const y=rect.bottom+8;
    setPopupWord({raw:word,clean});
    setPopupPos({x,y:Math.min(y,window.innerHeight-180)});
  }

  function addWordToDict(word,translation){
    // Don't close popup here — WordPopup closes itself after showing success
    const existing=app.words.find(w=>w.en.toLowerCase()===word.toLowerCase());
    if(existing){setToast('Уже в словаре: '+word);setTimeout(()=>setToast(''),2000);return false;}
    const settings = askWordSettings(word, translation);
    const w={
      id:uid(),
      en:word,
      ru:translation||'—',
      partOfSpeech:settings.pos,
      topic:settings.topic,
      note:'из книги',
      learned:false,
      learnedDate:null,
      lastReviewed:null,
      correct:0,
      wrong:0,
      streak:0,
      created:new Date().toISOString()
    };
    const words=[...app.words,w];
    const newStats={...app.stats,wordsFromBooks:(app.stats.wordsFromBooks||0)+1};
    const na={...app,words,stats:newStats};
    const achs=checkAchievements(na);if(achs.length)na.stats={...na.stats,achievements:[...(na.stats.achievements||[]),...achs]};
    setApp(na);setAddedWords(a=>({...a,[word]:true}));
    setToast('✅ «'+word+'» добавлено!');setTimeout(()=>setToast(''),2200);
    return true;
  }

  function finishReading(){
    const today=todayStr();
    // Add this level to today's read books
    const newReadLevels=[...todayReadLevels,selectedLevel];
    const newDailyBooks={...dailyBooksRead,[today]:newReadLevels};
    const newStats={...app.stats,booksRead:(app.stats.booksRead||0)+1,dailyBooksRead:newDailyBooks};
    const na={...app,stats:newStats};
    const achs=checkAchievements(na);if(achs.length)na.stats={...na.stats,achievements:[...(na.stats.achievements||[]),...achs]};
    setApp(na);setFinished(true);
  }

  
  function detectPartOfSpeech(word, translation){
    const verbs=['open','close','go','come','take','make','do','say','get','see','know','think','look','want','give','use','find','tell','ask','work','seem','feel','try','leave','call','read','write','eat','drink','sleep','run','walk'];
    const adjectives=['beautiful','happy','sad','big','small','good','bad','important','different'];
    const lower=word.toLowerCase();

    if(verbs.includes(lower)) return 'verb';
    if(adjectives.includes(lower)) return 'adjective';

    if(lower.endsWith('ly')) return 'adverb';
    if(lower.endsWith('ing')||lower.endsWith('ed')) return 'verb';

    return 'noun';
  }

  function askWordSettings(word, translation){
    let detectedPos = detectPartOfSpeech(word, translation);
    let pos = prompt(
`Часть речи для слова "${word}"

Система определила: ${detectedPos}

Можно изменить вручную:
noun — существительное
verb — глагол
adjective — прилагательное
adverb — наречие`,
detectedPos
    ) || detectedPos;

    let topic = prompt(
`Тема слова "${word}"

Например:
general
travel
school
books
food

Можно написать свою тему.`,
'general'
    ) || 'general';

          const isReadTodayLevel=todayReadLevels.includes(story.level);

            <div key={story.level} className="card" style={{marginBottom:10,cursor:isReadTodayLevel?'not-allowed':'pointer',opacity:isReadTodayLevel?.5:1}} onClick={()=>{if(!isReadTodayLevel){setSelectedLevel(story.level);setAddedWords({});setFinished(false);}}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <span className={`level-badge level-${story.level}`}>{story.level}</span>
                    {isReadTodayLevel&&<span style={{fontSize:11,color:'var(--sage)'}}>✓ прочитана</span>}
                  </div>

                  <div style={{fontSize:12,color:'#aaa',marginTop:3}}>{story.text.split(' ').length} слов</div>
                </div>
                <span style={{fontSize:22,opacity:isReadTodayLevel?.2:.4}}>→</span>
              </div>
            </div>
          );
        })}

    );
  }

  const story=BOOK_STORIES[selectedLevel];

  // FINISHED SCREEN
  if(finished){
    const wordsAdded=Object.keys(addedWords).length;
    return(
      <div className="fade-in" style={{textAlign:'center',paddingTop:24}}>
        <div style={{fontSize:56,marginBottom:12}}>📚</div>
        <h2 className="section-title">Книга прочитана!</h2>
        <p style={{fontSize:14,color:'#aaa',margin:'8px 0 20px'}}>«{story.title}» — {story.level}</p>
        {wordsAdded>0&&<div className="card" style={{marginBottom:16,padding:14}}>
          <div style={{fontSize:13,color:'var(--sage)',fontWeight:600}}>✅ Добавлено {wordsAdded} новых слов в словарь</div>
        </div>}
        <div className="book-read-msg" style={{marginTop:20,marginBottom:20}}>
          <div style={{fontSize:44,marginBottom:12}}>🌙</div>
          <div style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:18,color:'var(--warm)',marginBottom:8,fontWeight:600}}>Возвращайтесь завтра!</div>
          <div style={{fontSize:13,color:'#888',lineHeight:1.5}}>Каждый день появляется новая книга для каждого уровня. Завтра у уровня <strong>{story.level}</strong> будет другая книга.</div>
        </div>
        <button className="btn btn-primary" style={{width:'100%',padding:14,marginBottom:10}} onClick={()=>{setSelectedLevel(null);setFinished(false);}}>← К списку книг</button>

}

function WordPopup({word,pos,appWords,onAdd,onClose}){
  const[translation,setTranslation]=useState('');
  const[loading,setLoading]=useState(true);
  const[adding,setAdding]=useState(false);
  const[added,setAdded]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[selectedTopic,setSelectedTopic]=useState('general');
  const[selectedPos,setSelectedPos]=useState('noun');
  const existing=appWords.find(w=>w.en.toLowerCase()===word.clean.toLowerCase());

  useEffect(()=>{
    setLoading(true);setTranslation('');setAdded(false);
    if(existing){setTranslation(existing.ru);setLoading(false);return;}
    // Try multiple free translation APIs
    async function tryTranslate(){
      // API 1: MyMemory (free, CORS-friendly)
      try{
        const r=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(word.clean)+'&langpair=en|ru');
        const d=await r.json();
        const t=d?.responseData?.translatedText;
        if(t && t.toLowerCase()!==word.clean.toLowerCase() && t.length<100 && !/^[A-Z0-9\s]+$/.test(t)){
          setTranslation(t);setLoading(false);return;
        }
      }catch(e){}
      // API 2: Lingva Translate (open source, CORS ok)
      try{
        const r=await fetch('https://lingva.ml/api/v1/en/ru/'+encodeURIComponent(word.clean));
        const d=await r.json();
        const t=d?.translation;
        if(t && t.toLowerCase()!==word.clean.toLowerCase()){
          setTranslation(t);setLoading(false);return;
        }
      }catch(e){}
      // Both failed — user types manually
      setLoading(false);
    }
    tryTranslate();
  },[word.clean]);

  function handleAdd(){
    if(adding||added)return;
    setShowSettings(true);
  }

  function confirmAdd(){
    if(adding||added||!translation.trim())return;
    setAdding(true);
    const ok=onAdd(word.clean,translation);
    setAdded(true);setAdding(false);
    setShowSettings(false);
    setTimeout(()=>onClose(),800);
  }

  return(
    <div className="word-popup" style={{left:pos.x,top:pos.y,position:'fixed',zIndex:200}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:19,fontWeight:600}}>{word.clean}</div>
        <button style={{background:'none',border:'none',cursor:'pointer',color:'#ccc',fontSize:17,padding:'0 0 0 10px'}} onClick={onClose}>✕</button>
      </div>
      <div style={{marginBottom:10}}>
        {loading
          ?<div style={{display:'flex',alignItems:'center',gap:6,color:'#bbb',fontSize:13}}>
              <span style={{display:'inline-block',animation:'pulse 1.2s infinite'}}>⏳</span> перевожу...
            </div>
          :<input
              className="input"
              style={{fontSize:16,padding:'8px 12px',fontWeight:500}}
              value={translation}
              onChange={e=>setTranslation(e.target.value)}
              placeholder="Введи перевод..."
              autoFocus
            />
        }
      </div>
      <div style={{display:'flex',gap:6}}>
        <button className="btn btn-ghost" onClick={()=>speak(word.clean)} style={{fontSize:15,padding:'7px 10px'}}>🔊</button>
        {existing||added
          ?<span style={{fontSize:12,color:'var(--sage)',padding:'7px 0',flex:1,textAlign:'center',fontWeight:600}}>✓ В словаре</span>
          :<button className="btn btn-primary" style={{flex:1,padding:'8px 12px',fontSize:13}}
              onClick={handleAdd}
              disabled={loading||adding||!translation.trim()}>
              {adding?'⏳...':'+ В словарь'}
            </button>}
      </div>
      {showSettings&&(
        <div className="word-add-modal" onClick={()=>setShowSettings(false)}>
          <div className="word-add-card" onClick={e=>e.stopPropagation()}>
            <h3>Добавить слово</h3>
            <div className="word-disp">{word.clean}</div>
            <div className="field-group">
              <label className="field-label"><span className="field-label-text">Часть речи</span></label>
              <select className="select" value={selectedPos} onChange={e=>setSelectedPos(e.target.value)}>
                <option value="noun">Существительное</option>
                <option value="verb">Глагол</option>
                <option value="adjective">Прилагательное</option>
                <option value="adverb">Наречие</option>
              </select>
            </div>
            <div className="field-group">
              <label className="field-label"><span className="field-label-text">Тема</span></label>
              <select className="select" value={selectedTopic} onChange={e=>setSelectedTopic(e.target.value)}>
                <option value="general">General</option>
                <option value="travel">Travel</option>
                <option value="food">Food</option>
                <option value="books">Books</option>
                <option value="school">School</option>
                <option value="diary">Diary</option>
                <option value="nature">Nature</option>
              </select>
            </div>
            <div style={{display:'flex',gap:8,marginTop:16}}>
              <button className="btn btn-outline" style={{flex:1,padding:'11px 12px',fontSize:12}} onClick={()=>setShowSettings(false)}>Отмена</button>
              <button className="btn btn-primary" style={{flex:1,padding:'11px 12px',fontSize:12}} onClick={confirmAdd}>Добавить</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

      </div>

        <h3 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Активность за 14 дней</h3>
        <div className="chart-bar">
          {last14.map(d=>(
            <div className="chart-col" key={d.date}>

        </div>
        <div style={{display:'flex',gap:12,marginTop:8}}>
          <span style={{fontSize:11,color:'#aaa'}}><span style={{display:'inline-block',width:8,height:8,background:'var(--rose)',borderRadius:2,marginRight:4}}/> новые</span>
          <span style={{fontSize:11,color:'#aaa'}}><span style={{display:'inline-block',width:8,height:8,background:'var(--sage)',borderRadius:2,marginRight:4}}/> повторение</span>
        </div>
      </div>
      <div className="card">
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:12}}>По темам</h3>
        {Object.entries(byTopic).map(([t,v])=>(
          <div key={t} style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span>{allTopics[t]||t}</span><span style={{color:'#aaa'}}>{v.l}/{v.t}</span></div>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${v.l/v.t*100}%`,background:'var(--lavender)'}}/></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ────── SETTINGS ──────
function SettingsPage({app,setApp,back}){
  const[msg,setMsg]=useState('');

  useEffect(()=>{
    if(window.google&&!app.user){
      try{
        window.google.accounts.id.initialize({
          client_id:'836240276310-urc8bgu3pp9gt6f0tt6ncus5e3akj8va.apps.googleusercontent.com',
          callback:async(response)=>{
            try{
              // Decode JWT token
              const base64Url=response.credential.split('.')[1];
              const base64=base64Url.replace(/-/g,'+').replace(/_/g,'/');
              const jsonPayload=decodeURIComponent(atob(base64).split('').map((c)=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
              const decoded=JSON.parse(jsonPayload);
              
              // Sign in to Firebase with ID token
              const credential=firebase.auth.GoogleAuthProvider.credential(response.credential);
              const result=await firebaseAuth.signInWithCredential(credential);
              const user=result.user;
              
              // Save user to app state
              const newApp={...app,user:{name:user.displayName||decoded.name,email:user.email||decoded.email,picture:user.photoURL||decoded.picture,uid:user.uid}};
              setApp(newApp);
              
              // Load from Firebase
              const remoteData=await loadFromFirebase(user);
              if(remoteData){
                setAppRaw(remoteData);
                saveData(remoteData);
                setMsg('✓ Синхронизация активирована! Данные загружены');
              }else{
                setMsg('✓ Вход выполнен! (Новый пользователь)');
              }
              setTimeout(()=>setMsg(''),3000);
            }catch(e){
              console.error('Google/Firebase error:',e);
              setMsg('✗ Ошибка: '+e.message);
            }
          },
          auto_select:false
        });
        window.google.accounts.id.renderButton(
          document.getElementById('google_signin_button'),
          {theme:'outline',size:'large',text:'signin_with'}
        );
      }catch(e){
        console.error('Google init error:',e);
      }
    }
  },[app.user]);

  const[ghToken,setGhToken]=useState(()=>localStorage.getItem('gh-token')||'');
  const[showToken,setShowToken]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const GH_USER='ari-fairy';const GH_REPO='english-journal';const GH_FILE='progress.json';
  function notify(text){setMsg(text);setTimeout(()=>setMsg(''),3500);}
  function saveToken(t){setGhToken(t);localStorage.setItem('gh-token',t);}
  async function ghRequest(method,body,sha){const url=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;const headers={'Authorization':'token '+ghToken,'Content-Type':'application/json'};const payload={message:'Sync '+todayStr(),content:btoa(unescape(encodeURIComponent(JSON.stringify(body))))};if(sha)payload.sha=sha;const res=await fetch(url,{method,headers,body:method==='GET'?undefined:JSON.stringify(payload)});return{res,data:await res.json()};}
  async function syncSave(){if(!ghToken){notify('❌ Введи токен');return;}setSyncing(true);notify('⏳ Сохраняю...');try{const url=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;const check=await fetch(url,{headers:{'Authorization':'token '+ghToken}});let sha=undefined;if(check.ok){const d=await check.json();sha=d.sha;}const{res}=await ghRequest('PUT',app,sha);if(res.ok)notify('✅ Прогресс сохранён!');else notify('❌ Ошибка. Проверь токен');}catch(e){notify('❌ Нет соединения');}setSyncing(false);}
  async function syncLoad(){if(!ghToken){notify('❌ Введи токен');return;}setSyncing(true);notify('⏳ Загружаю...');try{const url=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;const res=await fetch(url,{headers:{'Authorization':'token '+ghToken}});if(!res.ok){notify('❌ Файл не найден');setSyncing(false);return;}const d=await res.json();const json=JSON.parse(decodeURIComponent(escape(atob(d.content))));setApp(json);saveData(json);notify('✅ Прогресс загружен!');}catch(e){notify('❌ Ошибка загрузки');}setSyncing(false);}
  function exportData(){const blob=new Blob([JSON.stringify(app)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='my-english-'+todayStr()+'.json';a.click();URL.revokeObjectURL(url);notify('✅ Скачано');}
  function importData(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);setApp(d);saveData(d);notify('✅ Импортировано');}catch(err){notify('❌ Ошибка');}};r.readAsText(f);}
  function reset(){if(!confirm('Удалить все данные?'))return;localStorage.removeItem('my-eng-v3');location.reload();}
  return(
    <div className="fade-in">
      <button className="back-btn" onClick={back} style={{marginBottom:16}}>← Назад</button>
      <h2 className="section-title" style={{marginBottom:16}}>Настройки</h2>
      {msg&&<div className="card" style={{textAlign:'center',marginBottom:12,padding:11,fontSize:14}}>{msg}</div>}
      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:4}}>☁️ Google синхронизация</h3>
        <p style={{fontSize:12,color:'#aaa',marginBottom:12}}>Синхронизируй свой прогресс между устройствами</p>
        {!app.user?(
          <div>
            <div id="google_signin_button" style={{display:'flex',justifyContent:'center'}}></div>
            <p style={{fontSize:11,color:'#999',marginTop:12,textAlign:'center'}}>Войди через Google чтобы синхронизировать данные</p>
          </div>
        ):(
          <div style={{background:'rgba(148,161,135,.1)',border:'1.5px solid rgba(148,161,135,.25)',borderRadius:'1rem',padding:14,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--sage)',marginBottom:8}}>✓ Вход выполнен</div>
            <div style={{fontSize:12,color:'#888'}}>{app.user.email}</div>
            <button className="btn" style={{width:'100%',marginTop:12,padding:'10px 12px',fontSize:12,background:'transparent',border:'1.5px solid rgba(148,161,135,.25)',color:'var(--sage)',borderRadius:'999px',cursor:'pointer',fontFamily:'inherit',fontWeight:600}} onClick={async()=>{try{await firebaseAuth.signOut();}catch(e){}setApp({...app,user:null});setMsg('✓ Вы вышли');}}>Выйти</button>
          </div>
        )}
      </div>
      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>💾 Ручное копирование</h3>
        <button className="btn" style={{width:'100%',padding:11,marginBottom:8,fontSize:13}} onClick={exportData}>⬇️ Скачать (JSON)</button>
        <label className="btn" style={{width:'100%',padding:11,display:'block',textAlign:'center',cursor:'pointer',fontSize:13}}>⬆️ Загрузить (JSON)<input type="file" accept=".json" onChange={importData} className="hidden-input"/></label>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:6}}>Данные</h3>
        <p style={{fontSize:13,color:'#888'}}>Слов: {app.words.length} · Выучено: {app.words.filter(w=>w.learned).length} · Глаголов: {app.irregular.length}</p>
      </div>
      <button className="btn" style={{width:'100%',padding:13,color:'var(--rose)',border:'1.5px solid rgba(212,165,165,.25)',borderRadius:'999px'}} onClick={reset}>🗑 Сбросить всё</button>
    </div>
  );
}

// ────── APP ROOT ──────
function App(){
  const[app,setAppRaw]=useState(initApp);
  const[view,setView]=useState('home');
  const[sessionType,setSessionType]=useState('learn');
  const[welcome,setWelcome]=useState(false);
  const[newAch,setNewAch]=useState([]);
  const[currentUser,setCurrentUser]=useState(null);

  // INITIALIZE FIREBASE AND AUTH
  useEffect(()=>{
    initFirebase();
    
    if(firebaseAuth){
      const unsubscribe=firebaseAuth.onAuthStateChanged(async(user)=>{
        if(user){
          setCurrentUser(user);
          // LOAD FROM FIREBASE
          const remoteData=await loadFromFirebase(user);
          if(remoteData){
            setAppRaw(remoteData);
            saveData(remoteData);
            console.log('✅ Данные загружены из Firebase');
          }
        }else{
          setCurrentUser(null);
        }
      });
      return()=>unsubscribe();
    }
  },[]);

  useEffect(()=>{
    const today=todayStr();
    const last=app.stats.lastVisit;
    if(last!==today){
      const ds={...(app.stats.daily?.[today]||{date:today,learned:0,reviewed:0,correct:0,wrong:0})};
      const newStats={...app.stats,lastVisit:today,daily:{...app.stats.daily,[today]:ds}};
      if(last){const diff=Math.round((new Date(today)-new Date(last))/(864e5));newStats.streak=diff===1?(app.stats.streak||0)+1:1;newStats.best=Math.max(newStats.best||0,newStats.streak);}else{newStats.streak=1;}
      const na={...app,stats:newStats};setAppRaw(na);saveData(na);
      if(Object.keys(app.stats.daily||{}).length>0)setWelcome(true);
    }
  },[]);

  const setApp=useCallback((a)=>{
    // Check for new achievements on every app update
    const prevAchs=app.stats.achievements||[];
    const currAchs=a.stats?.achievements||[];
    const fresh=currAchs.filter(id=>!prevAchs.includes(id));
    if(fresh.length>0){
      const achObjs=fresh.map(id=>ACHIEVEMENTS_DEF.find(a=>a.id===id)).filter(Boolean);
      setNewAch(achObjs);
      setTimeout(()=>setNewAch([]),3500);
    }
    setAppRaw(a);
    saveData(a);
    // SAVE TO FIREBASE if user is logged in
    if(currentUser){
      saveToFirebase(currentUser,a);
    }
  },[app.stats.achievements,currentUser]);

  function start(t){setSessionType(t);setView('study');}

  return(
    <div className="app">
      {welcome&&(
        <div className="overlay" onClick={()=>setWelcome(false)}>
          <div className="card overlay-card" style={{textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:44,marginBottom:10}}>✨</div>
            <h2 className="section-title">С возвращением!</h2>
            <p className="sub-text">Серия: <span style={{color:'var(--rose)',fontWeight:700}}>{app.stats.streak||0} дней</span></p>
            <button className="btn btn-primary" style={{width:'100%',marginTop:14,padding:13}} onClick={()=>setWelcome(false)}>Продолжить →</button>
          </div>
        </div>
      )}
      {newAch.length>0&&(
        <div style={{position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',zIndex:400,display:'flex',flexDirection:'column',gap:8,alignItems:'center'}}>
          {newAch.map(a=>(
            <div key={a.id} style={{background:a.icon?'#fff':'#fff',border:'1.5px solid rgba(212,165,165,.3)',borderRadius:999,padding:'10px 20px',boxShadow:'0 8px 24px rgba(0,0,0,.1)',display:'flex',alignItems:'center',gap:8,animation:'fi .4s ease',fontSize:14,fontWeight:600}}>
              <span style={{fontSize:22}}>{a.icon}</span> {a.title} разблокировано!
            </div>
          ))}
        </div>
      )}
      {view==='home'&&<HomePage app={app} go={setView} start={start}/>}
      {view==='study'&&<StudyPage app={app} setApp={setApp} sessionType={sessionType} exit={()=>setView('home')}/>}
      {view==='words'&&<WordsPage app={app} setApp={setApp} back={()=>setView('home')}/>}
      {view==='add'&&<AddPage app={app} setApp={setApp} back={()=>setView('home')}/>}
      {view==='irregular'&&<IrregularPage app={app} setApp={setApp} back={()=>setView('home')}/>}
      {view==='reader'&&<ReaderPage app={app} setApp={setApp} back={()=>setView('home')}/>}
      {view==='stats'&&<StatsPage app={app} back={()=>setView('home')}/>}
      {view==='achievements'&&<AchievementsPage app={app} back={()=>setView('home')}/>}
      {view==='settings'&&<SettingsPage app={app} setApp={setApp} back={()=>setView('home')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
